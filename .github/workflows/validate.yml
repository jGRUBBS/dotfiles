name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install validation tools
        run: brew install chezmoi gitleaks python ripgrep shellcheck
      - name: Validate source
        run: ./tests/validate.sh
      - name: Scan full history
        run: gitleaks git --redact --no-banner
